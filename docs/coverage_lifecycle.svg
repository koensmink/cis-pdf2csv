
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <polygon points="0,0 14,7 0,14" fill="#93c5fd"/>
    </marker>
    <style>
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #7dd3fc; }
      .subtitle { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; fill: #94a3b8; }
      .boxTitle { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: white; }
      .boxText { font-family: Segoe UI, Arial, sans-serif; font-size: 14px; fill: #e2e8f0; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 13px; fill: #e2e8f0; }
    </style>
  </defs>

  <rect width="1400" height="520" fill="url(#bg)"/>
  <circle cx="1230" cy="90" r="160" fill="#172554" opacity="0.30"/>
  <circle cx="160" cy="430" r="120" fill="#0f766e" opacity="0.10"/>

  <text x="50" y="60" class="title">Coverage &amp; Rule Promotion Lifecycle</text>
  <text x="50" y="90" class="subtitle">How parsed CIS controls move from raw benchmark data to deterministic Intune rule coverage.</text>

  <g filter="url(#shadow)">
    <rect x="50" y="180" width="180" height="120" rx="20" fill="url(#blue)"/>
    <text x="75" y="220" class="boxTitle">1. Benchmark</text>
    <text x="75" y="248" class="boxText">CIS PDF input</text>
    <text x="75" y="270" class="boxText">Windows / macOS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="180" width="210" height="120" rx="20" fill="url(#purple)"/>
    <text x="305" y="220" class="boxTitle">2. Parsed Controls</text>
    <text x="305" y="248" class="boxText">JSONL dataset</text>
    <text x="305" y="270" class="boxText">normalized records</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="180" width="220" height="120" rx="20" fill="url(#green)"/>
    <text x="565" y="220" class="boxTitle">3. Auto Mapped</text>
    <text x="565" y="248" class="boxText">Deterministic rules</text>
    <text x="565" y="270" class="boxText">known Intune targets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="180" width="220" height="120" rx="20" fill="url(#red)"/>
    <text x="835" y="220" class="boxTitle">4. Manual Review</text>
    <text x="835" y="248" class="boxText">Unknown / low-confidence</text>
    <text x="835" y="270" class="boxText">controls</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="180" width="240" height="120" rx="20" fill="url(#amber)"/>
    <text x="1105" y="220" class="boxTitle">5. LLM Suggestions</text>
    <text x="1105" y="248" class="boxText">Structured proposals</text>
    <text x="1105" y="270" class="boxText">for human validation</text>
  </g>

  <line x1="230" y1="240" x2="280" y2="240" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="490" y1="240" x2="540" y2="240" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="760" y1="240" x2="810" y2="240" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1030" y1="240" x2="1080" y2="240" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="470" y="360" width="460" height="105" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="500" y="395" class="boxTitle">6. Promote to Rule Pack</text>
    <text x="500" y="423" class="boxText">Approved suggestions become deterministic mappings</text>
    <text x="500" y="445" class="boxText">and increase future automatic coverage.</text>
  </g>

  <path d="M1200 300 C1200 345, 920 320, 920 360" fill="none" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M700 360 C700 330, 650 325, 650 300" fill="none" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="1010" y="415" class="small">feedback loop</text>
</svg>
